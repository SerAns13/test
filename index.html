<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пример POST запроса</title>
    <script src="https://telegram.org/js/telegram-web-app.js?61"></script>
</head>
<body>

<button id="myButton">Buy</button>

<script>
  const button = document.getElementById('myButton');

  button.addEventListener('click', () => {
    const event = {
      type: "invoice_created",
      invoiceId: 123,
      amount: 500
    };
    window.Telegram.WebApp.sendData(JSON.stringify(event));
  });
</script>

</body>
</html>
