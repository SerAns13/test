<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пример POST запроса</title>
    <script src="https://telegram.org/js/telegram-web-app.js?61"></script>
</head>
<body>

<button id="myButton">Buy</button>

<script>
  const button = document.getElementById('myButton');

  button.addEventListener('click', () => {
    fetch('http://localhost:8080/invoices', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ name: 1 })
    })
    .then(response => {
      if (!response.ok) throw new Error(`Статус ошибки: ${response.status}`);
      return response.json();
    })
    .then(data => {
      console.log('Ответ сервера:', data);
      button.textContent = 'Успешно отправлено!';
      button.disabled = true; // блокируем кнопку после успешного запроса
    })
    .catch(error => {
      console.error('Ошибка:', error);
      alert('Произошла ошибка при отправке запроса.');
    });
  });
</script>

</body>
</html>
